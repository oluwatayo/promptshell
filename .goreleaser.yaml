# GoReleaser configuration. https://goreleaser.com
version: 2

project_name: promptshell

before:
  hooks:
    - go mod tidy

builds:
  - id: promptshell
    main: ./cmd/promptshell
    binary: promptshell
    env:
      - CGO_ENABLED=0
    # promptshell runs bash scripts, so it targets Unix-like systems only.
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{ .Version }}

archives:
  - id: default
    formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}

checksum:
  name_template: checksums.txt

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"
      - "Merge pull request"

release:
  draft: false
  prerelease: auto
